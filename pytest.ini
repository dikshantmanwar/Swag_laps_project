[pytest]
# Pytest configuration file

# Register custom markers
markers =
    invalid_login: marks tests as invalid login tests (deselect with '-m "not invalid_login"')
    fails: marks tests that are currently failing or under investigation
    serial: marks tests that must run serially (not in parallel)

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = testCases

# Console output options
console_output_style = progress

# Warnings
filterwarnings =
    ignore::DeprecationWarning

# HTML Report configuration
addopts = 
    --html=reports/report.html 
    --self-contained-html
    --css=reports/style.css
